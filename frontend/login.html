<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PMS</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260331a">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">📋</div>
                <div>
                    <div class="login-title">PMS</div>
                    <div class="login-sub">프로젝트 인력 일정 관리 시스템</div>
                </div>
            </div>

            <div class="login-heading">로그인</div>
            <div class="login-desc">계속하려면 계정 정보를 입력하세요.</div>

            <div class="login-error" id="error-msg"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="username" class="form-control"
                        autocomplete="username" autofocus placeholder="아이디 입력">
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" class="form-control"
                        autocomplete="current-password" placeholder="비밀번호 입력">
                </div>
                <button type="submit" class="login-btn" id="btn-login">로그인</button>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('auth_token')) {
            window.location.replace('/');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('error-msg');
            const btn   = document.getElementById('btn-login');

            errEl.style.display = 'none';
            if (!username || !password) {
                errEl.textContent = '아이디와 비밀번호를 입력하세요.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '로그인 중...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.detail || '로그인에 실패했습니다.';
                    errEl.style.display = 'block';
                    return;
                }
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('auth_user', JSON.stringify(data.user));
                window.location.replace('/');
            } catch (err) {
                errEl.textContent = '서버와 연결할 수 없습니다.';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
